version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: facturin-db
    environment:
      POSTGRES_USER: facturin
      POSTGRES_PASSWORD: facturin
      POSTGRES_DB: facturin
    ports:
      - '5432:5432'
    volumes:
      - facturin_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U facturin']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: facturin-redis
    ports:
      - '6380:6379'
    volumes:
      - facturin_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: facturin-api
    environment:
      DATABASE_URL: postgresql://facturin:facturin@db:5432/facturin
      REDIS_HOST: redis
      REDIS_PORT: 6380
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@facturin.local}
      SUPER_ADMIN_PASSWORD_HASH: ${SUPER_ADMIN_PASSWORD_HASH:-}
      OSE_SUNAT_USERNAME: ${OSE_SUNAT_USERNAME:-}
      OSE_SUNAT_PASSWORD: ${OSE_SUNAT_PASSWORD:-}
    ports:
      - '3102:3102'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  facturin_data:
  facturin_redis:
